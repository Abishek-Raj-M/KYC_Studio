rubric_version: "1.0"
name: "PAN KYC Rubric"
checks:
  - id: pan_name_match
    description: "PAN card name matches ground truth"
    weight: 0.30
    criteria: "Fuzzy match >= 0.85 between extracted PAN name and ground truth name"
  - id: pan_dob_match
    description: "PAN date of birth matches ground truth"
    weight: 0.25
    criteria: "Exact date match after normalizing format"
  - id: pan_format
    description: "PAN number format is valid"
    weight: 0.25
    criteria: "Must match pattern AAAAA9999A"
  - id: pan_required_fields
    description: "PAN mandatory fields exist"
    weight: 0.20
    criteria: "name, pan, dob should be present and non-empty"

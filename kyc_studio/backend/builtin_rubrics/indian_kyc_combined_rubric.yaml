rubric_version: "1.0"
name: "Indian KYC Combined Rubric (Passport + PAN + Aadhaar)"
scope: "all_documents"
checks:
  - id: identity_name_consistency
    description: "Name consistency across Passport, PAN, Aadhaar, and ground truth"
    weight: 0.18
    criteria: "Compare extracted names across all uploaded documents against ground truth. Accept when spelling differences are minor and identity is clearly the same person."

  - id: identity_dob_consistency
    description: "DOB consistency across all documents and ground truth"
    weight: 0.16
    criteria: "DOB should match across uploaded documents and ground truth after date-format normalization."

  - id: gender_consistency
    description: "Gender consistency across documents and ground truth"
    weight: 0.08
    criteria: "Gender/sex should not conflict across uploaded documents and ground truth."

  - id: passport_validity
    description: "Passport identity and validity checks"
    weight: 0.14
    criteria: "Passport number should be present; key identity fields should be complete; expiration date should be valid when available."

  - id: pan_validity
    description: "PAN format and identity checks"
    weight: 0.14
    criteria: "PAN number should be present and conform to AAAAA9999A pattern; PAN name and DOB should align with ground truth."

  - id: aadhaar_validity
    description: "Aadhaar format and identity checks"
    weight: 0.14
    criteria: "Aadhaar number should be present and valid after normalization (12 digits); name/DOB should align with ground truth."

  - id: address_presence
    description: "Address quality check (Aadhaar)"
    weight: 0.06
    criteria: "Aadhaar should contain usable address information with at least locality and pincode when visible."

  - id: required_fields_completeness
    description: "Critical KYC field completeness"
    weight: 0.10
    criteria: "Critical fields per document type should be present and non-empty; missing mandatory identity fields should reduce score."
